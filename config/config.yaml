# =============================================================================
# config/config.yaml
# =============================================================================
# PURPOSE: Central configuration file for the entire project.
# All tunable parameters, paths, and settings live here.
# This follows the "12-Factor App" methodology used in production systems.
# =============================================================================

# -----------------------------------------------------------------------------
# PROJECT METADATA
# Describes the project. Used in logs, reports, and the Streamlit app header.
# -----------------------------------------------------------------------------
project:
  name: "Customer Analytics & Sales Prediction System"
  version: "1.0.0"
  author: "Your Name"
  description: "End-to-end ML pipeline for customer churn and sales prediction"

# -----------------------------------------------------------------------------
# PATHS
# All file and folder paths are defined here.
# We use relative paths so the project works on ANY machine.
# -----------------------------------------------------------------------------
paths:
  raw_data: "data/raw/customer_data.csv"
  processed_data: "data/processed/cleaned_data.csv"
  models_dir: "models/"
  reports_dir: "reports/figures/"
  logs_dir: "logs/"

# -----------------------------------------------------------------------------
# DATA SETTINGS
# -----------------------------------------------------------------------------
data:
  target_column: "Exited"
  id_columns:
    - "CustomerID"
  categorical_columns:
    - "Gender"
    - "Geography"
    - "HasCreditCard"
    - "IsActiveMember"
  numerical_columns:
    - "Age"
    - "Tenure"
    - "Balance"
    - "NumOfProducts"
    - "EstimatedSalary"
    - "CreditScore"
  test_size: 0.2
  random_state: 42

# -----------------------------------------------------------------------------
# FEATURE ENGINEERING SETTINGS
# -----------------------------------------------------------------------------
feature_engineering:
  create_interaction_features: true
  create_ratio_features: true
  create_age_groups: true
  age_bins:
    - 0
    - 30
    - 45
    - 60
    - 100
  age_labels:
    - "Young"
    - "Middle-aged"
    - "Senior"
    - "Elder"

# -----------------------------------------------------------------------------
# EDA SETTINGS
# -----------------------------------------------------------------------------
eda:
  plot_style: "seaborn-v0_8"
  figure_size:
    - 12
    - 6
  dpi: 150
  color_palette: "husl"

# -----------------------------------------------------------------------------
# MODEL TRAINING SETTINGS
# -----------------------------------------------------------------------------
models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    random_state: 42

  random_forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    random_state: 42
    n_jobs: -1

  gradient_boosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
    random_state: 42

  svm:
    C: 1.0
    kernel: "rbf"
    random_state: 42

  knn:
    n_neighbors: 5

# -----------------------------------------------------------------------------
# MODEL EVALUATION SETTINGS
# -----------------------------------------------------------------------------
evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"
    - "roc_auc"
  cv_folds: 5
  primary_metric: "f1_score"

# -----------------------------------------------------------------------------
# LOGGING SETTINGS
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  filename: "customer_analytics.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# -----------------------------------------------------------------------------
# STREAMLIT APP SETTINGS
# -----------------------------------------------------------------------------
app:
  title: "Customer Analytics Dashboard"
  page_icon: "📊"
  layout: "wide"
  sidebar_header: "⚙️ Prediction Controls"